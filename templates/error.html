<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FilaBridge - Error</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-box {
            background: white;
            border-radius: 12px;
            padding: 40px;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }
        .error-box h1 { margin-top: 0; color: #333; }
        .error-box p { color: #666; }
        .error-box a {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 24px;
            background: #667eea;
            color: white;
            border-radius: 6px;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="error-box">
        <h1>Something went wrong</h1>
        <p>{{.Error}}</p>
        <a href="/">Back to Dashboard</a>
    </div>
</body>
</html>
