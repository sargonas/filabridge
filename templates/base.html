<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="FilaBridge - The missing link between printers and filament inventory">
    <meta name="theme-color" content="#667eea">
    <title>FilaBridge Dashboard</title>
    <!-- External CSS Files -->
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="/static/css/components.css">
    <link rel="stylesheet" href="/static/css/dropdowns.css">
    <link rel="stylesheet" href="/static/css/tabs.css">
    <link rel="stylesheet" href="/static/css/printers.css">
    <link rel="stylesheet" href="/static/css/nfc.css">
    <link rel="stylesheet" href="/static/css/modals.css">
    
    <!-- Preload critical JavaScript -->
    <link rel="preload" href="/static/js/main.js" as="script">
    <link rel="preload" href="/static/js/dropdowns.js" as="script">
</head>
<body data-spoolman-url="{{.SpoolmanBaseURL}}">
    <div class="container">
        <div class="header">
            <h1>🔗 FilaBridge Dashboard</h1>
            <p>The missing link between printers and filament inventory</p>
        </div>
        
        <div class="content">
            <!-- Tab Navigation -->
            <ul class="tabs">
                <li><button class="tab active" data-tab="status" onclick="switchTab('status')">📊 Filament Status</button></li>
                <li><button class="tab" data-tab="nfc" onclick="switchTab('nfc')">📱 NFC Management</button></li>
                {{if .HistoryEnabled}}<li><button class="tab" data-tab="history" onclick="switchTab('history')">🗒️ Print History</button></li>{{end}}
                <li><button class="tab" data-tab="settings" onclick="switchTab('settings')">⚙️ Settings</button></li>
                {{if .SpoolmanBaseURL}}<li><a class="tab" href="{{.SpoolmanBaseURL}}" target="_blank" rel="noopener">🧵 Spoolman ↗</a></li>{{end}}
            </ul>
            
            {{template "content" .}}
        </div>
    </div>

    <div style="text-align: center; padding: 15px; color: rgba(255,255,255,0.75); font-size: 0.85em;">
        FilaBridge {{.Version}} &middot;
        <a href="https://github.com/sargonas/filabridge" target="_blank" rel="noopener" style="color: inherit; text-decoration: none; display: inline-flex; align-items: center; gap: 4px; vertical-align: middle;" title="FilaBridge on GitHub">
            <svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>GitHub
        </a>
    </div>

    {{template "modals" .}}

    <!-- External JavaScript Files -->
    <script src="/static/js/main.js"></script>
    <script src="/static/js/dropdowns.js"></script>
    <script src="/static/js/printers.js"></script>
    <script src="/static/js/websocket.js"></script>
    <script src="/static/js/nfc.js"></script>
</body>
</html>
