services:
  filabridge:
    image: ghcr.io/sargonas/filabridge:latest
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5000/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  # Optional: Apprise API for push notifications (Discord, Telegram, Slack, email, etc.)
  # Uncomment to enable, then configure in FilaBridge Settings > Notifications
  # with API URL: http://apprise:8000
  # apprise:
  #   image: caronc/apprise:latest
  #   ports:
  #     - "8000:8000"
  #   restart: unless-stopped
